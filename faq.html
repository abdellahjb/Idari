<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — إداري Idari</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="idari-breadcrumb">
  <div class="container">
    <a href="index.html" id="bc-home">Accueil</a>
    <span class="sep">›</span>
    <span class="current" id="bc-current">FAQ</span>
  </div>
</div>

<div class="page-hero">
  <div class="container">
    <div class="page-hero-icon">❓</div>
    <div class="section-tag mb-2" id="ph-tag">FAQ</div>
    <h1 id="ph-title">Questions fréquentes</h1>
    <p id="ph-desc">Retrouvez les réponses aux questions les plus posées sur les démarches administratives au Maroc.</p>
  </div>
</div>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="faq-wrap accordion" id="faqAccordion"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="idari.js"></script>
<script>
initLang();

function renderFAQ(l) {
  const list = faqs[l] || [];
  document.getElementById('faqAccordion').innerHTML = list.map((f,i) => `
    <div class="accordion-item mb-2 fade-up" style="animation-delay:${i*.06}s">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
          data-bs-toggle="collapse" data-bs-target="#faq${i}">
          ${f.q}
        </button>
      </h2>
      <div id="faq${i}" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">
        <div class="accordion-body">${f.a}</div>
      </div>
    </div>`).join('');
}

function applyLang(l) {
  const t = T[l];
  document.title = t.faqTitle + ' — إداري Idari';
  document.getElementById('bc-home').textContent    = t.breadHome;
  document.getElementById('bc-current').textContent = t.faqTag;
  document.getElementById('ph-tag').textContent     = t.faqTag;
  document.getElementById('ph-title').textContent   = t.faqTitle;
  document.getElementById('ph-desc').textContent    = l==='fr'
    ? 'Retrouvez les réponses aux questions les plus posées sur les démarches administratives au Maroc.'
    : 'إجابات على أكثر الأسئلة تداولاً حول الإجراءات الإدارية في المغرب.';
  document.getElementById('nav-placeholder').innerHTML    = buildNav('faq');
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
  const langToggle = document.getElementById('lang-toggle');
  if (langToggle) langToggle.textContent = l === 'fr' ? 'عربي' : 'Français';
  renderFAQ(l);
}

applyLang(getLang());
</script>
</body>
</html>
